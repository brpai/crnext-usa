name: Sync inventory (daily)

# Mirrors Super Speed Car's public inventory into CarNext once a day.
# 05:00 UTC ‚âà 00:00 America/New_York (EST). In summer (EDT) it runs ~01:00 ET.
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: {}   # allow manual "Run workflow"

permissions:
  contents: write

concurrency:
  group: sync-inventory
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scrape inventory
        run: node scripts/sync-inventory.mjs

      - name: Commit & push if inventory changed
        run: |
          if [[ -n "$(git status --porcelain assets/data/inventory.json)" ]]; then
            git config user.name "carnext-inventory-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/data/inventory.json
            git commit -m "chore: daily inventory sync ($(date -u +%Y-%m-%d))"
            git push
            echo "Inventory updated and pushed."
          else
            echo "No inventory changes today."
          fi
